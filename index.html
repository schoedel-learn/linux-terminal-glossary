<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Terminal Glossary — 2,086 Commands</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ──────────────────────────────────────────── */
:root, [data-theme="light"] {
  --color-bg: #0d1117;
  --color-surface: #161b22;
  --color-surface-2: #1c2128;
  --color-surface-3: #21262d;
  --color-border: #30363d;
  --color-divider: #21262d;
  --color-text: #e6edf3;
  --color-text-muted: #8b949e;
  --color-text-faint: #484f58;
  --color-primary: #58a6ff;
  --color-primary-hover: #79b8ff;
  --color-primary-dim: rgba(88,166,255,0.12);
  --color-primary-dim2: rgba(88,166,255,0.06);
  --color-accent: #3fb950;
  --color-accent-dim: rgba(63,185,80,0.12);
  --color-warn: #d29922;
  --color-warn-dim: rgba(210,153,34,0.12);
  --color-tag-bg: #1f2937;
  --color-tag-text: #79b8ff;
  --color-cmd-bg: #0d1117;
  --color-cmd-text: #79c0ff;
  --color-copy-bg: #21262d;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.8rem);
  --text-sm: clamp(0.8rem, 0.75rem + 0.25vw, 0.9rem);
  --text-base: clamp(0.9rem, 0.85rem + 0.25vw, 1rem);
  --text-lg: clamp(1rem, 0.9rem + 0.5vw, 1.2rem);
  --text-xl: clamp(1.2rem, 1rem + 1vw, 1.75rem);
  --text-2xl: clamp(1.75rem, 1.2rem + 2vw, 2.5rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem; --space-20: 5rem;
  --transition: 150ms cubic-bezier(0.16,1,0.3,1);
  --sidebar-w: 240px;
}
[data-theme="light"] {
  --color-bg: #f6f8fa;
  --color-surface: #ffffff;
  --color-surface-2: #f0f3f6;
  --color-surface-3: #e8edf2;
  --color-border: #d0d7de;
  --color-divider: #e8edf2;
  --color-text: #1f2328;
  --color-text-muted: #57606a;
  --color-text-faint: #b0bac3;
  --color-primary: #0969da;
  --color-primary-hover: #0550ae;
  --color-primary-dim: rgba(9,105,218,0.1);
  --color-primary-dim2: rgba(9,105,218,0.05);
  --color-accent: #1a7f37;
  --color-accent-dim: rgba(26,127,55,0.1);
  --color-warn: #9a6700;
  --color-warn-dim: rgba(154,103,0,0.1);
  --color-tag-bg: #ddf4ff;
  --color-tag-text: #0550ae;
  --color-cmd-bg: #f6f8fa;
  --color-cmd-text: #0550ae;
  --color-copy-bg: #f0f3f6;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
}

/* ─── RESET ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6;-webkit-font-smoothing:antialiased}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,select{font:inherit;color:inherit}
a{color:var(--color-primary);text-decoration:none}
a:hover{color:var(--color-primary-hover)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ─── LAYOUT ─────────────────────────────────────────────────── */
.app{display:flex;min-height:100dvh}

/* ─── SIDEBAR (mobile-first: off-screen drawer) ───────────────── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--color-surface);
  border-right:1px solid var(--color-border);
  display:flex;flex-direction:column;
  position:fixed;left:0;top:0;height:100dvh;
  overflow:hidden;
  transform:translateX(-100%);
  transition:transform var(--transition);
  z-index:100;
}
.sidebar.open{transform:translateX(0)}
.sidebar-header{
  padding:var(--space-4) var(--space-4) var(--space-3);
  border-bottom:1px solid var(--color-border);
  flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3);background:none;border:none;padding:0;cursor:pointer;text-align:left;border-radius:var(--radius);transition:opacity .15s;-webkit-tap-highlight-color:transparent;width:100%}
.logo:hover{opacity:.8}
.logo:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px}
.logo-icon{width:28px;height:28px;flex-shrink:0}
.logo-text{font-size:var(--text-sm);font-weight:700;letter-spacing:-0.02em;line-height:1.2}
.logo-text span{color:var(--color-primary)}
.stats-row{
  display:flex;gap:var(--space-2);flex-wrap:wrap;
}
.stat-chip{
  font-size:var(--text-xs);font-family:var(--font-mono);
  background:var(--color-primary-dim);color:var(--color-primary);
  border-radius:var(--radius-full);padding:2px var(--space-2);
  font-weight:500;
}
.sidebar-cats{
  flex:1;overflow-y:auto;padding:var(--space-2) 0;
}
.sidebar-cats::-webkit-scrollbar{width:4px}
.sidebar-cats::-webkit-scrollbar-track{background:transparent}
.sidebar-cats::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:2px}
.cat-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:var(--space-4) var(--space-4);
  font-size:var(--text-sm);font-weight:500;
  color:var(--color-text-muted);
  transition:all var(--transition);
  border-radius:0;text-align:left;gap:var(--space-2);
  border-left:2px solid transparent;
  min-height:52px;
  -webkit-tap-highlight-color:transparent;
}
.cat-btn:hover{background:var(--color-surface-2);color:var(--color-text)}
.cat-btn.active{
  background:var(--color-primary-dim2);color:var(--color-primary);
  border-left-color:var(--color-primary);
}
.cat-btn .count{
  font-size:var(--text-sm);font-family:var(--font-mono);
  color:var(--color-text-faint);flex-shrink:0;font-weight:400;
}
.cat-btn.active .count{color:var(--color-primary);opacity:0.7}
.sidebar-footer{
  padding:var(--space-3) var(--space-4);
  border-top:1px solid var(--color-border);flex-shrink:0;
}
.theme-btn{
  display:flex;align-items:center;gap:var(--space-2);
  font-size:var(--text-xs);color:var(--color-text-muted);
  width:100%;padding:var(--space-2) var(--space-2);
  border-radius:var(--radius-md);
  transition:all var(--transition);
}
.theme-btn:hover{background:var(--color-surface-2);color:var(--color-text)}

/* ─── MAIN ─────────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden}

/* ─── TOPBAR (mobile-first) ──────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--color-surface);
  border-bottom:1px solid var(--color-border);
  padding:var(--space-3) var(--space-3);
  display:flex;align-items:center;gap:var(--space-3);
  box-shadow:var(--shadow-sm);
}
.menu-btn{
  display:flex;
  align-items:center;justify-content:center;
  width:40px;height:40px;
  border-radius:var(--radius-md);
  color:var(--color-text-muted);
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.menu-btn:hover{background:var(--color-surface-2);color:var(--color-text)}
.search-wrap{
  flex:1;position:relative;
  display:flex;align-items:center;
}
.search-icon{
  position:absolute;left:var(--space-3);
  color:var(--color-text-muted);pointer-events:none;flex-shrink:0;
}
.search-input{
  width:100%;
  background:var(--color-bg);
  border:1.5px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-10) var(--space-3) var(--space-8);
  font-size:16px; /* prevents iOS zoom on focus */
  color:var(--color-text);
  transition:border-color var(--transition), box-shadow var(--transition), background var(--transition);
  outline:none;
  -webkit-appearance:none;
}
.search-input::placeholder{color:var(--color-text-faint)}
.search-input:focus{
  border-color:var(--color-primary);
  box-shadow:0 0 0 3px var(--color-primary-dim);
  background:var(--color-surface);
}
.search-mode-badge{
  position:absolute;right:var(--space-3);
  font-size:var(--text-xs);font-family:var(--font-mono);
  background:var(--color-surface-3);color:var(--color-text-muted);
  border-radius:var(--radius-sm);padding:1px 6px;pointer-events:none;
  opacity:0;transition:opacity var(--transition);
}
.search-input:not(:placeholder-shown) ~ .search-mode-badge{opacity:1}
.search-meta{
  font-size:var(--text-xs);color:var(--color-text-muted);
  white-space:nowrap;flex-shrink:0;
  font-family:var(--font-mono);
  min-width:80px;text-align:right;
  display:none; /* hidden on mobile, shown on desktop */
}

/* ─── FILTER BAR (mobile-first: tight padding, touch-scroll) ── */
.filter-bar{
  padding:var(--space-2) var(--space-3);
  border-bottom:1px solid var(--color-divider);
  display:flex;align-items:center;gap:var(--space-2);
  overflow-x:auto;
  scrollbar-width:none;
  background:var(--color-surface);
  -webkit-overflow-scrolling:touch;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{
  display:inline-flex;align-items:center;
  font-size:var(--text-xs);font-weight:500;
  padding:var(--space-3) var(--space-4);
  border-radius:var(--radius-full);
  border:1.5px solid var(--color-border);
  color:var(--color-text-muted);
  background:transparent;
  white-space:nowrap;
  transition:all var(--transition);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  min-height:48px;
}
.filter-chip:hover{border-color:var(--color-text-muted);color:var(--color-text)}
.filter-chip.active{
  background:var(--color-primary);border-color:var(--color-primary);
  color:#fff;
}

/* ─── CONTENT (mobile-first: compact padding) ─────────────────── */
.content{flex:1;padding:var(--space-4) var(--space-3) var(--space-16);max-width:1100px}

/* Category headers */
.cat-section{margin-bottom:var(--space-10)}
.cat-section:last-child{margin-bottom:0}
.cat-header{
  display:flex;align-items:center;gap:var(--space-3);
  margin-bottom:var(--space-4);
  padding-bottom:var(--space-3);
  border-bottom:1px solid var(--color-divider);
}
.cat-title{
  font-size:var(--text-lg);font-weight:700;
  letter-spacing:-0.02em;
}
.cat-count{
  font-size:var(--text-xs);font-family:var(--font-mono);
  color:var(--color-text-muted);
  background:var(--color-surface-2);
  border-radius:var(--radius-full);
  padding:2px 8px;
}

/* Command grid (mobile-first: single column) */
.cmd-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:var(--space-3);
}

/* Command card */
.cmd-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-4);
  position:relative;
  transition:all var(--transition);
  overflow:hidden;
  display:flex;flex-direction:column;gap:var(--space-2);
  cursor:default;
}
.cmd-card::before{
  content:'';position:absolute;inset:0;
  border-radius:var(--radius-lg);
  background:linear-gradient(135deg, var(--color-primary-dim2), transparent 60%);
  opacity:0;transition:opacity var(--transition);
  pointer-events:none;
}
.cmd-card:hover{
  border-color:var(--color-primary);
  box-shadow:var(--shadow-md);
  transform:translateY(-1px);
}
.cmd-card:hover::before{opacity:1}
.cmd-card.highlighted{
  border-color:var(--color-primary);
  background:var(--color-primary-dim2);
}
.cmd-card.highlighted::before{opacity:1}

/* Command top row */
.cmd-top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-2)}
.cmd-code{
  font-family:var(--font-mono);font-size:var(--text-sm);font-weight:600;
  color:var(--color-cmd-text);
  background:var(--color-cmd-bg);
  border:1px solid var(--color-border);
  border-radius:var(--radius-sm);
  padding:var(--space-1) var(--space-2);
  line-height:1.4;
  word-break:break-all;flex:1;
  user-select:all;
}
.cmd-copy{
  width:36px;height:36px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);
  background:var(--color-copy-bg);
  color:var(--color-text-muted);
  transition:all var(--transition);
  opacity:1; /* always visible on mobile (no hover) */
  border:1px solid transparent;
  -webkit-tap-highlight-color:transparent;
}
.cmd-copy:hover{
  background:var(--color-primary-dim);
  color:var(--color-primary);
  border-color:var(--color-primary);
}
.cmd-copy.copied{
  color:var(--color-accent);
  background:var(--color-accent-dim);
  border-color:var(--color-accent);
  opacity:1;
}

/* Desc */
.cmd-desc{
  font-size:var(--text-sm);
  color:var(--color-text-muted);
  line-height:1.55;
}
.cmd-desc mark{
  background:var(--color-warn-dim);
  color:var(--color-warn);
  border-radius:2px;padding:0 2px;
  font-style:normal;
}

/* Category tag */
.cmd-cat-tag{
  display:inline-flex;align-items:center;
  font-size:var(--text-xs);font-weight:500;
  color:var(--color-tag-text);
  background:var(--color-tag-bg);
  border-radius:var(--radius-sm);
  padding:2px 6px;
  margin-top:auto;
  width:fit-content;
}

/* ─── EMPTY STATE ───────────────────────────────────────────── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  padding:var(--space-20) var(--space-8);
  text-align:center;gap:var(--space-4);
}
.empty-icon{color:var(--color-text-faint);opacity:0.5}
.empty-title{font-size:var(--text-lg);font-weight:600;color:var(--color-text-muted)}
.empty-sub{font-size:var(--text-sm);color:var(--color-text-faint);max-width:36ch}

/* ─── LOADING ─────────────────────────────────────────────── */
.loading-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:var(--space-20) var(--space-8);
  gap:var(--space-4);
}
.spinner{
  width:32px;height:32px;
  border:3px solid var(--color-border);
  border-top-color:var(--color-primary);
  border-radius:50%;
  animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SIDEBAR OVERLAY ───────────────────────────────────── */
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.6);z-index:99;
  opacity:0;pointer-events:none;
  transition:opacity var(--transition);
}
.sidebar-overlay.open{display:block;opacity:1;pointer-events:auto}

/* ─── SCROLL TO TOP ─────────────────────────────────────── */
.scroll-top{
  position:fixed;bottom:var(--space-4);right:var(--space-4);
  width:44px;height:44px;
  background:var(--color-primary);
  color:#fff;
  border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-md);
  opacity:0;pointer-events:none;
  transform:translateY(8px);
  transition:all var(--transition);
  z-index:200;
}
.scroll-top.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
.scroll-top:hover{background:var(--color-primary-hover)}

/* ─── DESKTOP BREAKPOINT (min-width → mobile-first) ──────── */
@media(min-width:769px){
  .sidebar{
    position:sticky;top:0;
    transform:none;
  }
  .sidebar-overlay{display:none !important}
  .menu-btn{display:none}
  .topbar{padding:var(--space-3) var(--space-6);gap:var(--space-4)}
  .filter-bar{padding:var(--space-3) var(--space-6)}
  .content{padding:var(--space-4) var(--space-6) var(--space-16)}
  .cmd-grid{grid-template-columns:repeat(auto-fill, minmax(340px, 1fr))}
  .search-meta{display:block}
  .search-input{font-size:var(--text-base);padding:var(--space-2) var(--space-10) var(--space-2) var(--space-8)}
  .cmd-copy{width:28px;height:28px;opacity:0}
  .cmd-card:hover .cmd-copy{opacity:1}
  .filter-chip{padding:var(--space-1) var(--space-3);min-height:auto}
  .cat-btn{font-size:var(--text-xs);padding:var(--space-2) var(--space-4);min-height:44px}
  .cat-btn .count{font-size:var(--text-xs)}
}

/* ─── SMALL MOBILE ───────────────────────────────────────── */
@media(max-width:480px){
  :root{--sidebar-w:85vw}
  .cmd-code{font-size:clamp(0.72rem,0.65rem + 0.3vw,0.85rem)}
  .leaderboard-drawer{width:100vw}
}

/* ─── HIGHLIGHT ─────────────────────────────────────────── */
.hl{background:rgba(255,200,0,0.25);border-radius:2px;padding:0 1px}

/* ─── TOOLTIP ────────────────────────────────────────────── */
.cmd-info{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);
  color:var(--color-text-faint);
  transition:all var(--transition);
  -webkit-tap-highlight-color:transparent;
}
.cmd-info:hover,.cmd-info.active{color:var(--color-primary);background:var(--color-primary-dim)}
/* on mobile info is always visible; on desktop appears on hover */
.cmd-info{opacity:1}
@media(min-width:769px){
  .cmd-info{opacity:0}
  .cmd-card:hover .cmd-info{opacity:1}
}

.tip-popover{
  position:fixed;
  z-index:500;
  width:min(320px, calc(100vw - 32px));
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  padding:var(--space-4);
  display:none;
  flex-direction:column;
  gap:var(--space-2);
  animation:tipIn 130ms cubic-bezier(0.16,1,0.3,1);
}
.tip-popover.open{display:flex}
@keyframes tipIn{
  from{opacity:0;transform:scale(0.95) translateY(4px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.tip-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-2);
}
.tip-cmd{
  font-family:var(--font-mono);font-size:var(--text-sm);font-weight:600;
  color:var(--color-primary);word-break:break-all;flex:1;
}
.tip-close{
  width:24px;height:24px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);color:var(--color-text-faint);
  transition:all var(--transition);
}
.tip-close:hover{background:var(--color-surface-2);color:var(--color-text)}
.tip-label{
  font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--color-text-faint);margin-top:var(--space-1);
}
.tip-text{
  font-size:var(--text-sm);color:var(--color-text);line-height:1.65;
}

/* ─── LEADERBOARD PANEL ─────────────────────────────────── */
.leaderboard-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:400;
  opacity:0;pointer-events:none;
  transition:opacity 180ms ease;
}
.leaderboard-overlay.open{
  display:block;opacity:1;pointer-events:auto;
}
.leaderboard-drawer{
  position:fixed;top:0;right:0;bottom:0;
  width:min(420px, 100vw);
  background:var(--color-surface);
  border-left:1px solid var(--color-border);
  box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;
  z-index:401;
  transform:translateX(100%);
  transition:transform 220ms cubic-bezier(0.16,1,0.3,1);
}
.leaderboard-overlay.open .leaderboard-drawer{
  transform:translateX(0);
}
.lb-header{
  padding:var(--space-4) var(--space-5);
  border-bottom:1px solid var(--color-border);

</head>
<body>

<script>
// ─── STATE ────────────────────────────────────────────────────────
let COMMANDS = [];
let CATEGORIES = [];
let SEARCH_INDEX = null;
let IDF = {};
let SYNONYMS = {};

let activeCategory = 'All';
let searchQuery = '';
let searchTimeout = null;
let historyCommitTimeout = null;

// ─── HISTORY (localStorage) ───────────────────────────────────────
const HISTORY_KEY = 'ltg_search_history';
const HISTORY_MAX = 30;

function historyLoad() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch(e) { return []; }
}
function historySave(arr) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); } catch(e){}
}

// Called 800ms after the user stops typing (only if query is meaningful)
function historyCommit(query) {
  const q = query.trim();
  if (q.length < 2) return;
  let arr = historyLoad();
  // Find existing entry
  const idx = arr.findIndex(e => e.q.toLowerCase() === q.toLowerCase());
  if (idx !== -1) {
    // Bump count and move to top
    arr[idx].count = (arr[idx].count || 1) + 1;
    arr[idx].ts = Date.now();
    const entry = arr.splice(idx, 1)[0];
    arr.unshift(entry);
  } else {
    arr.unshift({ q, count: 1, ts: Date.now() });
  }
  // Trim to max
  if (arr.length > HISTORY_MAX) arr = arr.slice(0, HISTORY_MAX);
  historySave(arr);
}

function historyDelete(q) {
  let arr = historyLoad().filter(e => e.q !== q);
  historySave(arr);
  renderHistoryPanel();
}

function historyClear() {
  historySave([]);
  renderHistoryPanel();
}

function historyApply(q) {
  const input = document.getElementById('searchInput');
  input.value = q;
  searchQuery = q;
  hideHistoryPanel();
  renderAll();
}

// ─── HISTORY PANEL UI ─────────────────────────────────────────────
function showHistoryPanel() {
  const panel = document.getElementById('historyPanel');
  renderHistoryPanel();
  panel.style.display = 'flex';
}
function hideHistoryPanel() {
  const panel = document.getElementById('historyPanel');
  panel.style.display = 'none';
}
function renderHistoryPanel() {
  const list = document.getElementById('historyList');
  const arr = historyLoad();
  if (arr.length === 0) {
    list.innerHTML = `<div class="history-empty">No recent searches yet.<br>Start typing to search 2,086 commands.</div>`;
    return;
  }
  list.innerHTML = arr.map(e => `
    <div class="history-item" data-q="${escapeAttr(e.q)}">
      <svg class="history-item-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      <span class="history-item-text">${escapeHtml(e.q)}</span>
      ${e.count > 1 ? `<span class="history-item-count">${e.count}×</span>` : ''}
      <button class="history-item-del" data-del="${escapeAttr(e.q)}" title="Remove" aria-label="Remove ${escapeHtml(e.q)}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>`).join('');

  // Bind clicks on rows
  list.querySelectorAll('.history-item').forEach(row => {
    row.addEventListener('mousedown', e => {
      // Don't fire if they clicked the delete button
      if (e.target.closest('.history-item-del')) return;
      e.preventDefault(); // prevent blur before click registers
      historyApply(row.dataset.q);
    });
  });
  // Bind delete buttons
  list.querySelectorAll('.history-item-del').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      historyDelete(btn.dataset.del);
    });
  });
}

function escapeAttr(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── LEADERBOARD ──────────────────────────────────────────────────
const LEADERBOARD_TOP = 10;

function lbGetTopN() {
  // Sort all history entries by count descending, take top N
  return historyLoad()
    .filter(e => e.count >= 1)
    .sort((a, b) => (b.count || 1) - (a.count || 1))
    .slice(0, LEADERBOARD_TOP);
}

function lbUpdateTriggerBadge() {
  const badge = document.getElementById('lbTriggerBadge');
  if (!badge) return;
  const top = lbGetTopN();
  if (top.length === 0) {
    badge.textContent = '—';
  } else {
    badge.textContent = `#${top.length}`;
  }
}

function openLeaderboard() {
  renderLeaderboard();
  document.getElementById('lbOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLeaderboard() {
  document.getElementById('lbOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderLeaderboard() {
  const body = document.getElementById('lbBody');
  const footerLabel = document.getElementById('lbFooterLabel');
  const top = lbGetTopN();
  const all = historyLoad();
  const totalSearches = all.reduce((s, e) => s + (e.count || 1), 0);

  footerLabel.textContent = all.length
    ? `${all.length} unique ${all.length === 1 ? 'query' : 'queries'} · ${totalSearches} total searches`
    : '';

  if (top.length === 0) {
    body.innerHTML = `
      <div class="lb-empty">
        <svg class="lb-empty-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <div class="lb-empty-title">No data yet</div>
        <div class="lb-empty-sub">Search for commands to start building your leaderboard.</div>
      </div>`;
    return;
  }

  // Max count for bar width calculation
  const maxCount = top[0].count || 1;
  const rankLabel = (i) => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
  const medal = (i) => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;

  body.innerHTML = top.map((e, i) => {
    const pct = Math.round((e.count / maxCount) * 85); // max 85% so text always readable
    return `
    <div class="lb-row" style="--lb-pct:${pct}%" data-q="${escapeAttr(e.q)}" title="Click to search again">
      <span class="lb-rank ${rankLabel(i)}">${medal(i)}</span>
      <span class="lb-query">${escapeHtml(e.q)}</span>
      <span class="lb-count">${e.count}×</span>
    </div>`;
  }).join('');

  // Click rows to run the search again
  body.querySelectorAll('.lb-row').forEach(row => {
    row.addEventListener('click', () => {
      closeLeaderboard();
      setTimeout(() => historyApply(row.dataset.q), 80); // let drawer close first
    });
  });

  // Animate bars in after paint
  requestAnimationFrame(() => {
    body.querySelectorAll('.lb-row').forEach((row, i) => {
      row.style.setProperty('--lb-pct', '0%');
      setTimeout(() => {
        const pct = Math.round(((top[i]?.count || 0) / maxCount) * 85);
        row.style.setProperty('--lb-pct', pct + '%');
      }, 60 + i * 40);
    });
  });
}

// Bind leaderboard open/close
document.getElementById('lbTrigger').addEventListener('click', openLeaderboard);
document.getElementById('lbClose').addEventListener('click', closeLeaderboard);
document.getElementById('lbOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('lbOverlay')) closeLeaderboard();
});
document.getElementById('lbClearAll').addEventListener('mousedown', e => {
  e.preventDefault();
  historyClear();
  lbUpdateTriggerBadge();
  renderLeaderboard();
});

// Update badge on init and after each history commit
const _origHistoryCommit = historyCommit;
window._historyCommitWrapped = true;
const _historyCommitOrig = historyCommit;
function historyCommitAndBadge(query) {
  const q = query.trim();
  if (q.length < 2) return;
  let arr = historyLoad();
  const idx = arr.findIndex(e => e.q.toLowerCase() === q.toLowerCase());
  if (idx !== -1) {
    arr[idx].count = (arr[idx].count || 1) + 1;
    arr[idx].ts = Date.now();
    const entry = arr.splice(idx, 1)[0];
    arr.unshift(entry);
  } else {
    arr.unshift({ q, count: 1, ts: Date.now() });
  }
  if (arr.length > HISTORY_MAX) arr = arr.slice(0, HISTORY_MAX);
  historySave(arr);
  lbUpdateTriggerBadge();
}

// ─── THEME TOGGLE ─────────────────────────────────────────────────
(function(){
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  // Default to dark for terminal aesthetic
  d = 'dark';
  r.setAttribute('data-theme', d);
  const btn = document.querySelector('[data-theme-toggle]');
  if(btn) {
    btn.addEventListener('click', () => {
      d = d === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', d);
    });
  }
})();

// ─── LOAD DATA ────────────────────────────────────────────────────
async function loadData() {
  const [cmdRes, idxRes] = await Promise.all([
    fetch('commands.json'),
    fetch('search_index.json')
  ]);
  const cmdData = await cmdRes.json();
  const idxData = await idxRes.json();

  COMMANDS = cmdData.commands;
  CATEGORIES = cmdData.categories;
  SEARCH_INDEX = idxData.index;
  IDF = idxData.idf;
  SYNONYMS = idxData.synonyms;

  document.getElementById('totalCount').textContent = `${COMMANDS.length} commands`;
  document.getElementById('catCount').textContent = `${CATEGORIES.length} categories`;
  buildSidebar();
  buildFilterBar();
  renderAll();

  // Logo → Home
  document.getElementById('logoHomeBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    selectCategory('All');
    closeSidebar();
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
}

// ─── SIDEBAR ──────────────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('sidebarCats');
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.dataset.cat = 'All';
  allBtn.innerHTML = `<span>All Commands</span><span class="count">${COMMANDS.length}</span>`;
  allBtn.addEventListener('click', () => handleCatTap('All'));
  nav.appendChild(allBtn);

  CATEGORIES.forEach(cat => {
    const count = COMMANDS.filter(c => c.category === cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    // Shorten long category names
    const short = cat.replace('Package Management - APT/Ubuntu','APT Package Mgmt')
                     .replace('GitHub CLI (gh)','GitHub CLI (gh)')
                     .replace('System Services & Systemd','Systemd Services')
                     .replace('Archiving & Compression','Archive & Compress')
                     .replace('Productivity & Search','Productivity & Search');
    btn.innerHTML = `<span>${short}</span><span class="count">${count}</span>`;
    btn.addEventListener('click', () => handleCatTap(cat));
    nav.appendChild(btn);
  });
}

// Tap logic: first tap on a new item → navigate; tap on already-active item → close drawer
function handleCatTap(cat) {
  const isMobile = window.innerWidth < 769;
  const alreadyActive = activeCategory === cat;
  selectCategory(cat);
  if (isMobile) {
    if (alreadyActive) {
      closeSidebar(); // second tap on same item dismisses drawer
    }
    // first tap: drawer stays open so user can see it highlighted
    // (auto-close happens on second tap or via overlay/Esc)
  }
}

function selectCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  // Sync filter chips
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  renderAll();
  // Note: drawer closing is handled by handleCatTap() for sidebar,
  // and directly for filter chips (which are always visible, no drawer needed)
}

// ─── FILTER BAR ───────────────────────────────────────────────────
function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip active';
  allChip.dataset.cat = 'All';
  allChip.textContent = 'All';
  allChip.addEventListener('click', () => selectCategory('All'));
  bar.appendChild(allChip);

  const shortcuts = [
    'Node.js & npm/yarn',
    'Git - Core','Git - Advanced','GitHub CLI (gh)','GitHub CLI Extra',
    'Docker','Docker Advanced','Python CLI','Gemini CLI',
    'tmux','Vim/Neovim','Networking','SSH & Remote',
    'System Services & Systemd','Process Management',
    'Text Processing','Bash Scripting','File Operations',
    'Package Management - APT/Ubuntu'
  ];
  const shortLabels = {
    'Node.js & npm/yarn': 'Node/npm',
    'Package Management - APT/Ubuntu': 'APT',
    'System Services & Systemd': 'Systemd',
    'GitHub CLI (gh)': 'gh CLI',
    'GitHub CLI Extra': 'gh CLI Extra',
    'Docker Advanced': 'Docker+',
  };
  shortcuts.forEach(cat => {
    if (!CATEGORIES.includes(cat)) return; // skip if category doesn't exist
    const chip = document.createElement('button');
    chip.className = 'filter-chip';
    chip.dataset.cat = cat;
    chip.textContent = shortLabels[cat] || cat;
    chip.addEventListener('click', () => selectCategory(cat));
    bar.appendChild(chip);
  });
}

// ─── TOKENIZE ─────────────────────────────────────────────────────
function tokenize(text) {
  return text.toLowerCase().match(/[a-z0-9][a-z0-9\-\.]*[a-z0-9]|[a-z0-9]/g) || [];
}

// ─── SEARCH ENGINE ────────────────────────────────────────────────
// Hybrid: keyword match + TF-IDF cosine similarity + synonym expansion
// Description-first: all token matching weighted across cmd + desc + category
function scoreCommand(cmd, queryTokens, expandedTokens) {
  let score = 0;
  const cmdLower = cmd.cmd.toLowerCase();
  const descLower = cmd.desc.toLowerCase();
  const catLower = cmd.category.toLowerCase();

  const rawQuery = searchQuery.toLowerCase().trim();

  // ── Exact & prefix match bonuses on command string
  if (cmdLower === rawQuery) score += 200;
  else if (cmdLower.startsWith(rawQuery)) score += 80;
  else if (cmdLower.includes(rawQuery)) score += 40;

  // ── Raw query phrase match on description (strong signal)
  if (descLower === rawQuery) score += 120;
  else if (descLower.startsWith(rawQuery)) score += 60;
  else if (descLower.includes(rawQuery)) score += 35;

  // ── Token keyword scoring — balanced between cmd and desc
  for (const qt of queryTokens) {
    if (qt.length < 2) continue;
    // Command string matches
    if (cmdLower === qt) score += 100;
    else if (cmdLower.startsWith(qt + ' ') || cmdLower.endsWith(' ' + qt)) score += 50;
    else if (cmdLower.includes(qt)) score += 30;
    // Description matches — now equally weighted, not second-class
    if (descLower.includes(qt)) score += 28;
    // Category matches
    if (catLower.includes(qt)) score += 8;
  }

  // ── Synonym / semantic expansion
  for (const et of expandedTokens) {
    if (cmdLower.includes(et)) score += 10;
    if (descLower.includes(et)) score += 8;
  }

  // ── TF-IDF cosine similarity — always applied (not gated on score > 0)
  // This ensures description-only matches are surfaced even with no keyword hit
  if (SEARCH_INDEX) {
    const indexEntry = SEARCH_INDEX[cmd.id];
    if (indexEntry) {
      let dot = 0;
      for (const qt of [...queryTokens, ...expandedTokens]) {
        const qIdf = IDF[qt] || 0;
        const docW = indexEntry.tokens[qt] || 0;
        dot += qIdf * docW;
      }
      score += dot * 40;
    }
  }

  return score;
}

function getExpanded(queryTokens) {
  const expanded = new Set();
  const rawQuery = searchQuery.toLowerCase().trim();
  // Check synonyms for full query
  if (SYNONYMS[rawQuery]) {
    SYNONYMS[rawQuery].forEach(s => tokenize(s).forEach(t => expanded.add(t)));
  }
  // Check synonyms for individual tokens
  for (const qt of queryTokens) {
    if (SYNONYMS[qt]) {
      SYNONYMS[qt].forEach(s => tokenize(s).forEach(t => expanded.add(t)));
    }
  }
  // Remove tokens already in query
  queryTokens.forEach(t => expanded.delete(t));
  return [...expanded];
}

function search(query) {
  const qTokens = tokenize(query);
  if (qTokens.length === 0) return null; // show all

  const expanded = getExpanded(qTokens);
  let results = COMMANDS
    .filter(c => activeCategory === 'All' || c.category === activeCategory)
    .map(c => ({ cmd: c, score: scoreCommand(c, qTokens, expanded) }))
    .filter(r => r.score > 2)  // tiny threshold filters noise but allows desc-only TF-IDF hits
    .sort((a, b) => b.score - a.score);

  // Determine mode
  const isSemantic = expanded.length > 0 && results.some(r => {
    const tokens = tokenize(r.cmd.cmd + ' ' + r.cmd.desc);
    return qTokens.every(qt => !tokens.includes(qt)) && r.score > 0;
  });

  return { results: results.map(r => r.cmd), mode: isSemantic ? 'semantic' : 'keyword', expanded };
}

// ─── HIGHLIGHT ────────────────────────────────────────────────────
function highlight(text, tokens) {
  if (!tokens || tokens.length === 0) return escapeHtml(text);
  let result = escapeHtml(text);
  // Sort by length desc to match longer patterns first
  const sorted = [...tokens].sort((a, b) => b.length - a.length);
  for (const token of sorted) {
    if (!token || token.length < 2) continue;
    const escaped = token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
  }
  return result;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── RENDER ───────────────────────────────────────────────────────
function renderAll() {
  const content = document.getElementById('content');
  const meta = document.getElementById('searchMeta');
  const badge = document.getElementById('searchModeBadge');

  let displayCommands;
  let searchResult = null;
  let highlightTokens = [];

  if (searchQuery.trim().length > 0) {
    searchResult = search(searchQuery);
    displayCommands = searchResult ? searchResult.results : [];
    highlightTokens = tokenize(searchQuery);
    badge.textContent = searchResult?.mode || 'keyword';
    badge.style.background = searchResult?.mode === 'semantic'
      ? 'var(--color-warn-dim)' : 'var(--color-surface-3)';
    badge.style.color = searchResult?.mode === 'semantic'
      ? 'var(--color-warn)' : 'var(--color-text-muted)';
  } else {
    displayCommands = COMMANDS.filter(c =>
      activeCategory === 'All' || c.category === activeCategory
    );
    badge.textContent = 'keyword';
    badge.style.background = '';
    badge.style.color = '';
  }

  meta.textContent = `${displayCommands.length} results`;

  if (displayCommands.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6M11 8v6" opacity="0.5"/></svg>
        <div class="empty-title">No commands found</div>
        <div class="empty-sub">Try a different keyword or concept — e.g. "delete file", "list processes", "set up ssh"</div>
      </div>`;
    return;
  }

  // Group by category
  if (searchQuery.trim().length > 0) {
    // Search mode: flat list (sorted by relevance), grouped loosely
    const grouped = new Map();
    for (const cmd of displayCommands) {
      if (!grouped.has(cmd.category)) grouped.set(cmd.category, []);
      grouped.get(cmd.category).push(cmd);
    }
    let html = '';
    for (const [cat, cmds] of grouped) {
      html += renderSection(cat, cmds, highlightTokens);
    }
    content.innerHTML = html;
  } else {
    // Browse mode: by category in order
    const orderedCats = activeCategory === 'All'
      ? CATEGORIES
      : [activeCategory];
    let html = '';
    for (const cat of orderedCats) {
      const cmds = displayCommands.filter(c => c.category === cat);
      if (cmds.length > 0) html += renderSection(cat, cmds, []);
    }
    content.innerHTML = html;
  }

  // Bind copy buttons
  content.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => copyCmd(btn));
  });
}

function renderSection(cat, cmds, hlTokens) {
  let cards = '';
  for (const cmd of cmds) {
    const cmdHL = hlTokens.length > 0 ? highlight(cmd.cmd, hlTokens) : escapeHtml(cmd.cmd);
    const descHL = hlTokens.length > 0 ? highlight(cmd.desc, hlTokens) : escapeHtml(cmd.desc);
    const hasTip = cmd.tooltip && cmd.tooltip.trim().length > 0;
    cards += `
      <div class="cmd-card" id="cmd-${cmd.id}">
        <div class="cmd-top">
          <code class="cmd-code">${cmdHL}</code>
          <div style="display:flex;gap:4px;flex-shrink:0;align-items:center">
            ${hasTip ? `<button class="cmd-info" data-id="${cmd.id}" aria-label="Explain ${escapeHtml(cmd.cmd)}" title="Explain this command">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </button>` : ''}
            <button class="cmd-copy" data-copy="${escapeHtml(cmd.cmd)}" title="Copy command" aria-label="Copy ${escapeHtml(cmd.cmd)}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="cmd-desc">${descHL}</div>
        ${hlTokens.length > 0 ? `<span class="cmd-cat-tag">${escapeHtml(cmd.category)}</span>` : ''}
      </div>`;
  }
  return `
    <section class="cat-section" id="cat-${cat.replace(/[^a-z0-9]/gi,'-')}">
      <div class="cat-header">
        <h2 class="cat-title">${escapeHtml(cat)}</h2>
        <span class="cat-count">${cmds.length}</span>
      </div>
      <div class="cmd-grid">${cards}</div>
    </section>`;
}

// ─── TOOLTIP POPOVER ─────────────────────────────────────────────
const tipPopover = document.getElementById('tipPopover');
const tipCmd     = document.getElementById('tipCmd');
const tipText    = document.getElementById('tipText');
let   activeTipBtn = null;

function openTip(btn) {
  const id = parseInt(btn.dataset.id, 10);
  const cmd = COMMANDS.find(c => c.id === id);
  if (!cmd || !cmd.tooltip) return;

  // Close any open tip first
  if (activeTipBtn && activeTipBtn !== btn) {
    activeTipBtn.classList.remove('active');
  }
  // Toggle off if already open for this button
  if (activeTipBtn === btn && tipPopover.classList.contains('open')) {
    closeTip();
    return;
  }

  tipCmd.textContent  = cmd.cmd;
  tipText.textContent = cmd.tooltip;
  btn.classList.add('active');
  activeTipBtn = btn;

  // Position the popover
  tipPopover.classList.remove('open');
  tipPopover.style.display = 'flex'; // briefly visible to measure
  const btnRect = btn.getBoundingClientRect();
  const popW = tipPopover.offsetWidth;
  const popH = tipPopover.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const MARGIN = 8;

  // Prefer below, fallback to above
  let top = btnRect.bottom + MARGIN;
  if (top + popH > vh - MARGIN) top = btnRect.top - popH - MARGIN;
  if (top < MARGIN) top = MARGIN;

  // Prefer right-aligned to button, keep inside viewport
  let left = btnRect.right - popW;
  if (left < MARGIN) left = MARGIN;
  if (left + popW > vw - MARGIN) left = vw - popW - MARGIN;

  tipPopover.style.top  = top  + 'px';
  tipPopover.style.left = left + 'px';
  tipPopover.classList.add('open');
}

function closeTip() {
  tipPopover.classList.remove('open');
  tipPopover.style.display = 'none';
  if (activeTipBtn) activeTipBtn.classList.remove('active');
  activeTipBtn = null;
}

// Delegate info-button clicks from the content area
document.getElementById('content').addEventListener('click', e => {
  const btn = e.target.closest('.cmd-info');
  if (btn) { e.stopPropagation(); openTip(btn); return; }
  // Click anywhere outside popover closes it
  if (!tipPopover.contains(e.target)) closeTip();
});
document.getElementById('tipClose').addEventListener('click', closeTip);
// Clicking anywhere outside the popover closes it
document.addEventListener('click', e => {
  if (tipPopover.classList.contains('open') &&
      !tipPopover.contains(e.target) &&
      !e.target.closest('.cmd-info')) {
    closeTip();
  }
});
// Escape closes it too
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && tipPopover.classList.contains('open')) closeTip();
});
// Re-close on scroll so it doesn't float detached
window.addEventListener('scroll', () => { if (activeTipBtn) closeTip(); }, { passive: true });

// ─── COPY ─────────────────────────────────────────────────────────
async function copyCmd(btn) {
  const text = btn.dataset.copy;
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  btn.classList.add('copied');
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  }, 1500);
}

// ─── SEARCH INPUT ─────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('focus', function() {
  if (this.value.trim().length === 0) showHistoryPanel();
});

searchInput.addEventListener('input', function() {
  searchQuery = this.value;
  clearTimeout(searchTimeout);
  clearTimeout(historyCommitTimeout);
  // Hide history while actively searching
  hideHistoryPanel();
  searchTimeout = setTimeout(renderAll, 120);
  // Commit to history 800ms after user stops typing (if meaningful)
  if (this.value.trim().length >= 2) {
    historyCommitTimeout = setTimeout(() => historyCommitAndBadge(this.value.trim()), 800);
  }
});

searchInput.addEventListener('blur', function() {
  // Small delay so mousedown on history items fires first
  setTimeout(hideHistoryPanel, 150);
});

// Clear button shows history panel (user cleared the field)
searchInput.addEventListener('search', function() {
  if (this.value === '') {
    searchQuery = '';
    renderAll();
    showHistoryPanel();
  }
});

document.getElementById('historyClear').addEventListener('click', () => {
  historyClear();
});

// ─── MOBILE MENU ──────────────────────────────────────────────────
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}

document.getElementById('menuBtn').addEventListener('click', () => {
  const isOpen = document.getElementById('sidebar').classList.contains('open');
  isOpen ? closeSidebar() : openSidebar();
});
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

// ─── SCROLL TO TOP ────────────────────────────────────────────────
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ─── KEYBOARD SHORTCUT ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.key === '/' || (e.key === 'k' && (e.metaKey || e.ctrlKey))) && !e.target.matches('input')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    document.getElementById('searchInput').select();
  }
  if (e.key === 'Escape') {
    const input = document.getElementById('searchInput');
    if (document.getElementById('historyPanel').style.display !== 'none') {
      hideHistoryPanel();
      input.blur();
    } else {
      input.blur();
    }
    closeSidebar();
  }
});

// Close leaderboard on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('lbOverlay').classList.contains('open')) {
    closeLeaderboard();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────
lbUpdateTriggerBadge(); // show badge immediately from existing localStorage
loadData().catch(err => {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="empty-title">Failed to load data</div>
      <div class="empty-sub">${err.message}</div>
    </div>`;
});
</script>
